# Runs tests and verifies that the package can be built.
name: Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  package-build:
    runs-on: ${{matrix.operating-system}}
    strategy:
      fail-fast: false
      matrix:
        operating-system: [ubuntu-latest]
    if: github.repository != 'diepxuan/php-ext'
    # Steps represent a sequence of tasks that are executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GPG
        uses: diepxuan/.github/.github/actions/gpg-setup@main
        with:
          gpg_key: ${{ secrets.GPG_KEY }}
          gpg_key_id: ${{ secrets.GPG_KEY_ID }}
          committer_email: ${{ secrets.GIT_COMMITTER_EMAIL }}
          committer_name: ${{ github.repository_owner }}
      - name: SSH configuration
        uses: diepxuan/.github/.github/actions/ssh-setup@main
        with:
          ssh_key_id: ${{ secrets.SSH_ID_RSA }}

      - name: Package build
        working-directory: src
        shell: bash
        run: |
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh
          chmod +x build.sh
          bash build.sh
        env:
          INPUT_APT_OPTS:
          INPUT_EXTRA_BUILD_DEPS:
          repository: ${{ github.repository }}
          branch: ${{ github.ref_name }}
          DEBEMAIL: ductn@diepxuan.com
          EMAIL: ductn@diepxuan.com
          DEBFULLNAME: Tran Ngoc Duc
          NAME: Tran Ngoc Duc
          DEBIAN_FRONTEND: noninteractive
          GPG_KEY: ${{ secrets.GPG_KEY }}
          DEB_SIGN_KEYID: ${{ secrets.GPG_KEY_ID }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

  package-publish:
    needs: package-build
    permissions:
      contents: write
    uses: diepxuan/.github/.github/workflows/debian-package-publish.yml@main
    with:
      message: ${{ github.event.head_commit.message }}
    secrets:
      GPG_KEY: ${{ secrets.GPG_KEY }}
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
      GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
      SSH_ID_RSA: ${{ secrets.SSH_ID_RSA }}

  # Dong bo hai chieu giua php-ext va 3 repo con
  # - php-ext update -> push sang php-runkit7, php-sqlsrv, php-pdo_sqlsrv
  # - php-runkit7/php-sqlsrv/php-pdo_sqlsrv update -> merge ve php-ext
  package-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GPG
        uses: diepxuan/.github/.github/actions/gpg-setup@main
        with:
          gpg_key: ${{ secrets.GPG_KEY }}
          gpg_key_id: ${{ secrets.GPG_KEY_ID }}
          committer_email: ${{ secrets.GIT_COMMITTER_EMAIL }}
          committer_name: ${{ github.repository_owner }}

      - name: SSH configuration
        uses: diepxuan/.github/.github/actions/ssh-setup@main
        with:
          ssh_key_id: ${{ secrets.SSH_ID_RSA }}

      - name: Sync to clone
        if: github.repository == 'diepxuan/php-ext'
        shell: bash
        run: |
          set -e

          REPOS=("php-runkit7" "php-sqlsrv" "php-pdo_sqlsrv")
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Bo qua neu la sync commit de tranh loop
          if echo "$COMMIT_MSG" | grep -q "^\[sync\]"; then
            echo "Skip sync - this is a sync commit"
            exit 0
          fi

          # Them cac repo con lam remote
          for repo in "${REPOS[@]}"; do
            echo "=== Adding remote: $repo ==="
            git remote add "$repo" "git@github.com:diepxuan/$repo.git" 2>/dev/null || true
          done

          # Push sang cac repo con
          for repo in "${REPOS[@]}"; do
            echo "=== Pushing to $repo ==="
            if git push "$repo" main --force; then
              echo "Pushed to diepxuan/$repo"
            else
              echo "Failed to push to diepxuan/$repo"
            fi
          done

          echo "Sync complete"

      - name: Sync to base
        if: github.repository != 'diepxuan/php-ext'
        shell: bash
        run: |
          set -e

          REPO_NAME="${{ github.repository }}"
          REPO_NAME=${REPO_NAME#diepxuan/}
          COMMIT_MSG="${{ github.event.head_commit.message }}"

          # Bo qua neu la sync commit de tranh loop
          if echo "$COMMIT_MSG" | grep -q "^\[sync\]"; then
            echo "Skip sync - this is a sync commit"
            exit 0
          fi

          # Them php-ext lam remote
          echo "=== Adding remote: php-ext ==="
          git remote add php-ext "git@github.com:diepxuan/php-ext.git" 2>/dev/null || true

          # Fetch php-ext
          git fetch php-ext

          # Merge php-ext/main vao main hien tai
          echo "=== Merging php-ext/main into $REPO_NAME ==="
          if git merge php-ext/main --allow-unrelated-histories -m "[sync] Sync from php-ext: $COMMIT_MSG"; then
            echo "Merged php-ext/main into $REPO_NAME"
          else
            echo "Merge conflict or no changes, aborting merge"
            git merge --abort
            exit 0
          fi

          # Push sang php-ext
          echo "=== Pushing to php-ext ==="
          if git push php-ext main; then
            echo "Pushed to diepxuan/php-ext from $REPO_NAME"
          else
            echo "Failed to push to diepxuan/php-ext"
          fi

          echo "Sync complete"
